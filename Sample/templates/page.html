<!DOCTYPE html>
<html>

<head>
    <title>Sample Page</title>

    <link rel="stylesheet" href="/static/page.css">

</head>


<body>


<div class="main-container">

    <h1 class="heading">
        Sample Form
    </h1>


    <div class="input-container">

        <label class="label">
            Name:
        </label>

        <input 
            type="text"
            id="name"
            placeholder="Enter Name"
        />

    </div>



    <div class="input-container">

        <label class="label">
            Email:
        </label>

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
        />

    </div>



    <button 
        class="button"
        onclick="saveData()">

        Submit

    </button>


</div>



<script src="/static/page.js"></script>


</body>

</html>
